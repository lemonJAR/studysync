name: studysync
description: Student Task Manager - Flutter & Riverpod
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  riverpod: ^2.0.0
  flutter_riverpod: ^2.0.0
  
  # Local Storage
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  
  # Firebase (add later in phase 5)
  # firebase_core: ^2.0.0
  # firebase_auth: ^4.0.0
  # cloud_firestore: ^4.0.0
  # firebase_messaging: ^14.0.0
  # firebase_storage: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - assets/images/
    - assets/icons/

  # Fonts (add as you use them)
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: assets/fonts/CustomFont-Regular.ttf
